name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
          flutter pub get -C example

      # Runs flutter analyze, flutter test, example analyze, docs coverage,
      # and the public-API inventory diff. See scripts/verify.dart.
      - name: Verify
        run: dart run scripts/verify.dart
